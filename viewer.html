<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGBI Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a35;
    --accent: #00ffa3;
    --accent2: #ff5e5e;
    --accent3: #5eb8ff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,255,163,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(94,184,255,0.04) 0%, transparent 60%);
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header span {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }

  .drop-zone {
    width: 100%;
    max-width: 900px;
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 52px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent3);
    background: rgba(94,184,255,0.04);
    color: var(--text);
  }

  .drop-zone svg { opacity: 0.4; transition: opacity 0.2s; }
  .drop-zone:hover svg, .drop-zone.dragover svg { opacity: 0.8; }
  .drop-zone input { display: none; }

  .viewer-area {
    width: 100%;
    max-width: 900px;
    display: none;
    flex-direction: column;
    gap: 20px;
  }

  .meta-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-item .label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .meta-item .value { font-size: 0.9rem; color: var(--accent3); }

  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    border-radius: 4px;
    cursor: crosshair;
  }

  .zoom-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .zoom-bar button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .zoom-bar button:hover { border-color: var(--accent); color: var(--accent); }

  .zoom-label { color: var(--muted); font-size: 0.8rem; min-width: 44px; text-align: center; }

  .pixel-info {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    gap: 16px;
    align-items: center;
    min-height: 38px;
    width: 100%;
  }

  .pixel-swatch {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .pixel-info span { color: var(--accent); }

  .err {
    color: var(--accent2);
    font-size: 0.82rem;
    background: rgba(255,94,94,0.08);
    border: 1px solid rgba(255,94,94,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    width: 100%;
    max-width: 900px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>RGBI Viewer</h1>
  <span>drop a .rgbi file to inspect it</span>
</header>

<label class="drop-zone" id="drop">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  Drop .rgbi file here or click to browse
  <input type="file" accept=".rgbi,.txt" id="file-input">
</label>

<div class="err" id="err"></div>

<div class="viewer-area" id="viewer">
  <div class="meta-bar" id="meta-bar"></div>
  <div class="canvas-wrap">
    <div class="zoom-bar">
      <button onclick="zoom(-1)">−</button>
      <span class="zoom-label" id="zoom-label">8×</span>
      <button onclick="zoom(1)">+</button>
      <button onclick="fitZoom()">fit</button>
    </div>
    <canvas id="canvas"></canvas>
    <div class="pixel-info" id="pixel-info">
      <div class="pixel-swatch" id="swatch"></div>
      <span>hover a pixel to inspect</span>
    </div>
  </div>
</div>

<script>
let pixels = [], imgW = 0, imgH = 0, scale = 8;

const drop = document.getElementById('drop');
const fileInput = document.getElementById('file-input');
const viewer = document.getElementById('viewer');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const errEl = document.getElementById('err');

fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('dragover');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => parse(e.target.result);
  reader.readAsText(file);
}

function showErr(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
  viewer.style.display = 'none';
}

function parse(text) {
  errEl.style.display = 'none';
  try {
    const bsIdx = text.indexOf('\\');
    if (bsIdx === -1) throw new Error('Missing \\ (start of pixel data)');
    const header = text.slice(0, bsIdx);
    const rest = text.slice(bsIdx + 1);
    const endIdx = rest.indexOf('|');
    if (endIdx === -1) throw new Error('Missing | (end of image)');
    const pixelData = rest.slice(0, endIdx);
    const rowStrings = pixelData.split('/');
    const rows = rowStrings.map((rowStr, ri) => {
      const matches = [...rowStr.matchAll(/\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/g)];
      if (matches.length === 0) throw new Error(`Row ${ri+1} has no valid pixels`);
      return matches.map(m => [parseInt(m[1]), parseInt(m[2]), parseInt(m[3])]);
    });
    const w = rows[0].length;
    rows.forEach((r, i) => { if (r.length !== w) throw new Error(`Row ${i+1}: expected ${w} pixels, got ${r.length}`); });

    pixels = rows; imgW = w; imgH = rows.length;

    // meta
    const meta = document.getElementById('meta-bar');
    meta.innerHTML = [
      ['Header', header || '(none)'],
      ['Dimensions', `${w} × ${imgH}`],
      ['Pixels', (w * imgH).toLocaleString()],
    ].map(([l,v]) => `<div class="meta-item"><span class="label">${l}</span><span class="value">${v}</span></div>`).join('');

    fitZoom();
    render();
    viewer.style.display = 'flex';
    drop.style.display = 'none';
  } catch(e) { showErr('Parse error: ' + e.message); }
}

function render() {
  canvas.width = imgW * scale;
  canvas.height = imgH * scale;
  for (let y = 0; y < imgH; y++) {
    for (let x = 0; x < imgW; x++) {
      const [r,g,b] = pixels[y][x];
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  // grid lines if scale >= 6
  if (scale >= 6) {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= imgW; x++) { ctx.beginPath(); ctx.moveTo(x*scale, 0); ctx.lineTo(x*scale, imgH*scale); ctx.stroke(); }
    for (let y = 0; y <= imgH; y++) { ctx.beginPath(); ctx.moveTo(0, y*scale); ctx.lineTo(imgW*scale, y*scale); ctx.stroke(); }
  }
}

function zoom(dir) {
  const steps = [1,2,4,6,8,12,16,24,32];
  const i = steps.indexOf(scale);
  const ni = Math.max(0, Math.min(steps.length-1, i + dir));
  scale = steps[ni];
  document.getElementById('zoom-label').textContent = scale + '×';
  render();
}

function fitZoom() {
  const maxPx = Math.min(window.innerWidth - 80, 860);
  const steps = [1,2,4,6,8,12,16,24,32];
  let best = 1;
  for (const s of steps) { if (imgW * s <= maxPx && imgH * s <= 600) best = s; }
  scale = best;
  document.getElementById('zoom-label').textContent = scale + '×';
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / scale);
  const y = Math.floor((e.clientY - rect.top) / scale);
  if (x >= 0 && x < imgW && y >= 0 && y < imgH) {
    const [r,g,b] = pixels[y][x];
    document.getElementById('swatch').style.background = `rgb(${r},${g},${b})`;
    document.getElementById('pixel-info').innerHTML =
      `<div class="pixel-swatch" id="swatch" style="background:rgb(${r},${g},${b});width:20px;height:20px;border-radius:4px;border:1px solid #2a2a35;flex-shrink:0"></div>` +
      `x: <span>${x}</span> &nbsp; y: <span>${y}</span> &nbsp; rgb: <span>(${r}, ${g}, ${b})</span> &nbsp; hex: <span>#${[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}</span>`;
  }
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('pixel-info').innerHTML =
    `<div class="pixel-swatch" id="swatch" style="width:20px;height:20px;border-radius:4px;border:1px solid #2a2a35;flex-shrink:0"></div><span>hover a pixel to inspect</span>`;
});
</script>
</body>
</html>
